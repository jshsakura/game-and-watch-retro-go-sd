name: Generate gw_update.tar

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build-test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v3
        with:
          submodules: true

      - name: Build test
        run: |
          docker run --rm --user $(id -u):$(id -g) -v ${{ github.workspace }}:/opt/workdir sylverb/retro-go-sd-builder:v1.4 \
            bash -l -c "make -j\$$(nproc) CHECK_DIRTY_SUBMODULE=0 COVERFLOW=1 SHARED_HIBERNATE_SAVESTATE=1 DISABLE_SPLASH_SCREEN=1 ENABLE_BOOT_OC=1 INTFLASH_BANK=2 CHEAT_CODES=1 ZH_CN=1 ZH_TW=1 KO_KR=1 JA_JP=1 release"

      # Upload both build outputs so the PR run is enough to test on-device
      # (no merge/tag needed):
      #   retro-go_update.bin = firmware to flash
      #   gw_update.tar       = SD content, includes /roms/homebrew/Media.bin
      - name: Upload firmware + SD content artifacts
        uses: actions/upload-artifact@v4
        with:
          name: media-browser-build
          path: |
            release/retro-go_update.bin
            release/gw_update.tar

  build-package:
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository with submodules
      - name: Checkout repository with submodules
        uses: actions/checkout@v3
        with:
          submodules: true  # Clone submodules with --recurse-submodules

      # 2. Generate the update archive using Docker
      - name: Generate retro-go_update.bin
        run: |
          docker run --rm --user $(id -u):$(id -g) -v ${{ github.workspace }}:/opt/workdir sylverb/retro-go-sd-builder:v1.4 \
            bash -l -c "make -j\$$(nproc) CHECK_DIRTY_SUBMODULE=0 COVERFLOW=1 SHARED_HIBERNATE_SAVESTATE=1 DISABLE_SPLASH_SCREEN=1 ENABLE_BOOT_OC=1 INTFLASH_BANK=2 CHEAT_CODES=1 ZH_CN=1 ZH_TW=1 KO_KR=1 JA_JP=1 release"

      # 3. Upload retro-go_update.bin artifact
      - name: Upload retro-go_update.bin artifact
        uses: actions/upload-artifact@v4
        with:
          name: retro-go_update.bin
          path: release/retro-go_update.bin

  release-package:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository with submodules
      - name: Checkout repository with submodules
        uses: actions/checkout@v3
        with:
          submodules: true  # Clone submodules with --recurse-submodules

      # 2. Generate the update files using Docker
      - name: Generate firmware_update.bin and gw_update.tar
        run: |
          docker run --rm --user $(id -u):$(id -g) -v ${{ github.workspace }}:/opt/workdir sylverb/retro-go-sd-builder:v1.4 \
            bash -l -c "make -j\$$(nproc) CHECK_DIRTY_SUBMODULE=0 COVERFLOW=1 SHARED_HIBERNATE_SAVESTATE=1 DISABLE_SPLASH_SCREEN=1 ENABLE_BOOT_OC=1 INTFLASH_BANK=2 CHEAT_CODES=1 ZH_CN=1 ZH_TW=1 KO_KR=1 JA_JP=1 release"

      # 3. Create the release and attach the build outputs.
      #    NB: actions/create-release@v1 and actions/upload-release-asset@v1 are
      #    archived/deprecated and fail on current runners — use the maintained
      #    softprops/action-gh-release instead, which creates the release AND
      #    uploads the assets in one step.
      - name: Create Release and upload firmware
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
          files: |
            release/retro-go_update.bin
            release/gw_update.tar
